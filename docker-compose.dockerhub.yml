services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-mocktrade}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    image: ${MOCKTRADE_SERVER_IMAGE:-drleomeng/mocktrade-server:v0.1.1}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-mocktrade}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@mocktrade.com}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      AI_API_BASE: ${AI_API_BASE:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-4o}
      AI_REQUEST_TIMEOUT_MS: ${AI_REQUEST_TIMEOUT_MS:-15000}
      AI_MAX_RETRIES: ${AI_MAX_RETRIES:-2}
      AI_RETRY_BASE_DELAY_MS: ${AI_RETRY_BASE_DELAY_MS:-800}
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    volumes:
      - server_uploads:/app/apps/server/uploads

  web:
    image: ${MOCKTRADE_WEB_IMAGE:-drleomeng/mocktrade-web:v0.1.1}
    restart: unless-stopped
    depends_on:
      - server
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}

  nginx:
    image: ${MOCKTRADE_NGINX_IMAGE:-drleomeng/mocktrade-nginx:v0.1.1}
    restart: unless-stopped
    depends_on:
      - web
      - server
    ports:
      - "80:80"

volumes:
  postgres_data:
  redis_data:
  server_uploads:
