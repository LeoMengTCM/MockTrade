name: Docker Publish

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'drleomeng' || secrets.DOCKERHUB_USERNAME != ''
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract branch or tag name
        id: extract_ref
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "IS_TAG=true" >> $GITHUB_OUTPUT
          else
            echo "VERSION=latest" >> $GITHUB_OUTPUT
            echo "IS_TAG=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/server.Dockerfile
          push: true
          tags: |-
            ${{ env.DOCKERHUB_USERNAME }}/mocktrade-server:${{ steps.extract_ref.outputs.VERSION }}
            ${{ steps.extract_ref.outputs.IS_TAG == 'true' && format('{0}/mocktrade-server:latest', env.DOCKERHUB_USERNAME) || '' }}

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/web.Dockerfile
          push: true
          tags: |-
            ${{ env.DOCKERHUB_USERNAME }}/mocktrade-web:${{ steps.extract_ref.outputs.VERSION }}
            ${{ steps.extract_ref.outputs.IS_TAG == 'true' && format('{0}/mocktrade-web:latest', env.DOCKERHUB_USERNAME) || '' }}

      - name: Build and push Nginx image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/nginx.Dockerfile
          push: true
          tags: |-
            ${{ env.DOCKERHUB_USERNAME }}/mocktrade-nginx:${{ steps.extract_ref.outputs.VERSION }}
            ${{ steps.extract_ref.outputs.IS_TAG == 'true' && format('{0}/mocktrade-nginx:latest', env.DOCKERHUB_USERNAME) || '' }}
