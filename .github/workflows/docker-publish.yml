name: Docker Publish

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract tags
        id: extract_ref
        run: |
          USER=${{ env.DOCKERHUB_USERNAME }}
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            echo "SERVER_TAGS=${USER}/mocktrade-server:${VERSION},${USER}/mocktrade-server:latest" >> $GITHUB_OUTPUT
            echo "WEB_TAGS=${USER}/mocktrade-web:${VERSION},${USER}/mocktrade-web:latest" >> $GITHUB_OUTPUT
            echo "NGINX_TAGS=${USER}/mocktrade-nginx:${VERSION},${USER}/mocktrade-nginx:latest" >> $GITHUB_OUTPUT
          else
            echo "SERVER_TAGS=${USER}/mocktrade-server:latest" >> $GITHUB_OUTPUT
            echo "WEB_TAGS=${USER}/mocktrade-web:latest" >> $GITHUB_OUTPUT
            echo "NGINX_TAGS=${USER}/mocktrade-nginx:latest" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/server.Dockerfile
          push: true
          tags: ${{ steps.extract_ref.outputs.SERVER_TAGS }}

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/web.Dockerfile
          push: true
          tags: ${{ steps.extract_ref.outputs.WEB_TAGS }}

      - name: Build and push Nginx image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/nginx.Dockerfile
          push: true
          tags: ${{ steps.extract_ref.outputs.NGINX_TAGS }}
